<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARRERA ESPACIAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;padding:20px}
.container{max-width:900px;margin:0 auto}
h1{text-align:center;font-size:1.8em;color:#e6edf3;letter-spacing:6px;margin-bottom:4px}
.sub{text-align:center;color:#484f58;font-size:0.8em;margin-bottom:24px}

.score{display:flex;justify-content:space-between;align-items:center;padding:24px;
background:#161b22;border:1px solid #21262d;border-radius:12px;margin-bottom:20px}
.player{text-align:center;flex:1}
.player .name{font-size:1em;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.player .rep{font-size:2.2em;font-weight:900}
.player .info{font-size:0.75em;color:#484f58;margin-top:4px}
.vs{color:#30363d;font-size:1.5em;font-weight:900;padding:0 20px}
.p1{color:#58a6ff}.p2{color:#f85149}

.tabs{display:flex;gap:4px;margin-bottom:20px}
.tab{padding:8px 18px;background:#161b22;border:1px solid #21262d;border-radius:8px;
cursor:pointer;color:#484f58;font-size:0.85em;transition:all 0.2s}
.tab.active{color:#e6edf3;border-color:#e6edf3;background:#21262d;font-weight:600}
.tab:hover{background:#1c2028}
.panel{display:none}.panel.active{display:block}

.stats{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:20px}
.stats.two-col{grid-template-columns:1fr 1fr}
table.data{width:100%;border-collapse:collapse;font-size:0.85em}
table.data th{text-align:right;color:#484f58;font-size:0.75em;font-weight:600;padding:6px 0;border-bottom:1px solid #21262d}
table.data th:first-child{text-align:left}
table.data td{padding:6px 0;border-bottom:1px solid #161b22}
table.data td:first-child{color:#8b949e;text-align:left}
table.data td:nth-child(2){text-align:right;min-width:80px}
table.data td:nth-child(3){text-align:right;min-width:80px}
.card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:18px}
.card h3{font-size:0.7em;text-transform:uppercase;color:#484f58;letter-spacing:1px;margin-bottom:12px}
.row{display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:4px 0;font-size:0.85em}
.row .l{color:#8b949e;text-align:left}
.row .p1,.row .p2{text-align:right;min-width:70px}
.bar{display:flex;height:18px;border-radius:9px;overflow:hidden;background:#21262d;margin:6px 0}
.bar div{display:flex;align-items:center;justify-content:center;font-size:0.6em;font-weight:700;color:#fff}

.tl-item{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid #161b22;font-size:0.85em}
.tl-p1{flex:1;text-align:right;padding-right:14px;min-width:0}
.tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid #21262d}
.tl-dot.w1{background:#58a6ff;border-color:#58a6ff}.tl-dot.w2{background:#f85149;border-color:#f85149}
.tl-dot.tie{background:#d29922;border-color:#d29922}.tl-dot.none{background:#161b22}
.tl-p2{flex:1;padding-left:14px;min-width:0}
.tl-name{color:#8b949e;font-size:0.85em}
.tl-date{font-size:0.75em;color:#484f58}
.tl-first{color:#d29922;font-weight:600}
.tl-tier{font-size:0.65em;color:#30363d;letter-spacing:2px;text-transform:uppercase;padding:14px 0 4px;text-align:center;font-weight:600}
.tl-hist{font-size:0.65em;color:#21262d;margin-left:4px}

.news-item{padding:10px 0;border-bottom:1px solid #21262d;font-size:0.85em}
.news-item .date{color:#30363d;font-size:0.8em}
.news-item .tag{color:#d29922;font-weight:700;font-size:0.7em}

.import-box{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:18px;margin-bottom:12px}
.import-box h3{font-size:0.7em;text-transform:uppercase;color:#484f58;letter-spacing:1px;margin-bottom:8px}
.import-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.import-row input[type=text]{background:#0d1117;border:1px solid #21262d;color:#c9d1d9;padding:6px 10px;border-radius:6px;font-size:0.85em;width:150px}
.import-row input[type=file]{font-size:0.8em;color:#484f58}
.btn{padding:6px 16px;border:1px solid #e6edf3;background:#21262d;color:#e6edf3;border-radius:6px;cursor:pointer;font-size:0.82em}
.btn:hover{background:#30363d}
.btn-red{border-color:#f85149;background:#f8514920;color:#f85149}
.btn-red:hover{background:#f8514940}
.status{font-size:0.75em;color:#484f58;margin-top:6px}

@media(max-width:600px){
body{padding:10px}
h1{font-size:1.3em;letter-spacing:3px}
.score{flex-direction:column;gap:8px;padding:16px}
.vs{padding:4px 0;font-size:1.2em}
.player .rep{font-size:1.6em}
.tabs{flex-wrap:wrap}
.tab{flex:1;text-align:center;padding:8px 10px;font-size:0.78em;min-width:0}
table.data td:nth-child(2),table.data td:nth-child(3),table.data th:nth-child(2),table.data th:nth-child(3){min-width:60px;font-size:0.8em}
.tl-item{font-size:0.78em}
.tl-p1{padding-right:8px}
.tl-p2{padding-left:8px}
.tl-name{font-size:0.75em}
.import-row{flex-direction:column;align-items:stretch}
.import-row input[type=text]{width:100%}
.btn{width:100%;text-align:center}
}
</style>
</head>
<body>
<div class="container">
    <h1>CARRERA ESPACIAL</h1>
    <p class="sub">KSP RP-1 - Comparador de Carreras</p>

    <div class="score">
        <div class="player"><div class="name p1" id="n1">--</div><div class="rep p1" id="r1">--</div><div class="info" id="i1"></div></div>
        <div class="vs">VS</div>
        <div class="player"><div class="name p2" id="n2">--</div><div class="rep p2" id="r2">--</div><div class="info" id="i2"></div></div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="tab('dash')">Resumen</div>
        <div class="tab" onclick="tab('tl')">Hitos</div>
        <div class="tab" onclick="tab('news')">Noticias</div>
        <div class="tab" onclick="tab('imp')">Importar</div>
    </div>

    <div class="panel active" id="p-dash"><div class="stats" id="statsEl"></div></div>
    <div class="panel" id="p-tl"><div id="tlEl"></div></div>
    <div class="panel" id="p-news"><div id="newsEl"></div></div>
    <div class="panel" id="p-imp">
        <div class="import-box"><h3>Jugador 1</h3>
            <div class="import-row"><input type="text" id="n1i" placeholder="Nombre"><input type="file" id="f1" accept=".sfs"><button class="btn" onclick="imp(1)">IMPORTAR</button></div>
            <div class="status" id="s1"></div></div>
        <div class="import-box"><h3>Jugador 2</h3>
            <div class="import-row"><input type="text" id="n2i" placeholder="Nombre"><input type="file" id="f2" accept=".sfs"><button class="btn" onclick="imp(2)">IMPORTAR</button></div>
            <div class="status" id="s2"></div></div>
        <div class="import-box"><h3>Datos</h3>
            <div class="import-row">
                <button class="btn" onclick="sync()">ACTUALIZAR DESDE LA NUBE</button>
                <button class="btn btn-red" onclick="if(confirm('Borrar todos los datos?')){fetch(DB+'/race.json',{method:'DELETE'}).then(()=>location.reload())}">RESETEAR</button>
            </div><div class="status" id="ss"></div></div>
    </div>
</div>
<script>
const DB='https://ksp-rp1-default-rtdb.europe-west1.firebasedatabase.app';
const EPOCH=new Date(1951,0,1);
const MM={'first_FirstFlight':'Primer Lanzamiento','KarmanLine':'Linea de Karman','BreakSoundBarrier':'Barrera del Sonido (Tripulado)',
'FirstSatellite':'Primer Satelite','FirstSolarSat':'Primer Satelite Solar','FirstPolarSat':'Primer Satelite Polar',
'FirstScienceSat':'Primer Satelite Cientifico','AtmoSat':'Satelite de Analisis Atmosferico',
'EOSIRRad1':'Satelite de Radiometria IR','EOSIRRad2':'Radiometria IR (Siguiente)',
'EOSCosmicRay1':'Satelite Rayos Cosmicos (HEO)','EOSGrav1':'Satelite Gravimetrico',
'FirstNavSat-SCA':'Primer Satelite de Navegacion','EarlyNavNetwork3-SCA':'Red de Navegacion',
'XPlanesSupersonicMach2':'X-Planes: Mach 2','XPlanesStratosphericResearch':'X-Planes: Estratosferico',
'XPlanesHypersonic':'X-Planes: Hipersonico','XPlanesHighAltitude':'X-Planes: Gran Altitud',
'XPlanesKarman':'X-Planes: Linea de Karman','first_OrbitRecover':'Velocidad Orbital y Retorno',
'CrewedSuborbital':'Suborbital Tripulado','first_OrbitCrewed':'Orbital Tripulado',
'first_EVACrew':'Primera EVA','first_Rendezvous':'Primer Rendezvous','first_Docking':'Primer Acoplamiento',
'LunarImpactor':'Impacto Lunar','LunarFlyby':'Sobrevuelo Lunar','LunarOrbiter':'Orbitador Lunar',
'first_MoonLanding':'Aterrizaje Lunar (No Tripulado)','first_MoonLandingCrew':'Aterrizaje Lunar Tripulado'};
const MO=['Primer Lanzamiento','Linea de Karman','Barrera del Sonido (Tripulado)','Primer Satelite','Primer Satelite Solar',
'Primer Satelite Polar','Primer Satelite Cientifico','Satelite de Analisis Atmosferico',
'X-Planes: Mach 2','X-Planes: Estratosferico','X-Planes: Hipersonico','X-Planes: Gran Altitud','X-Planes: Linea de Karman',
'Satelite de Radiometria IR','Radiometria IR (Siguiente)','Satelite Rayos Cosmicos (HEO)','Satelite Gravimetrico',
'Primer Satelite de Navegacion','Red de Navegacion','Velocidad Orbital y Retorno','Suborbital Tripulado','Orbital Tripulado',
'Primera EVA','Primer Rendezvous','Primer Acoplamiento','Impacto Lunar','Sobrevuelo Lunar','Aterrizaje Lunar (No Tripulado)',
'Orbitador Lunar','Aterrizaje Lunar Tripulado'];
const TIERS={'Fundacion':[0,2],'Espacio Temprano':[3,7],'X-Planes':[8,12],'Observacion Terrestre':[13,16],
'Navegacion':[17,18],'Tripulado':[19,24],'Lunar':[25,29]};
const HIST={'Primer Lanzamiento':'1957-10-04','Primer Satelite':'1957-10-04','Barrera del Sonido (Tripulado)':'1947-10-14',
'Primer Satelite Solar':'1958-03-17','Orbital Tripulado':'1961-04-12','Impacto Lunar':'1959-09-14',
'Aterrizaje Lunar Tripulado':'1969-07-20','Primera EVA':'1965-03-18','X-Planes: Mach 2':'1953-11-20'};
const HL=['%s SORPRENDE AL MUNDO: %m!','ULTIMA HORA: %s LOGRA %m','TRIUNFO! %s CELEBRA %m',
'%s DOMINA LOS CIELOS CON %m','HISTORICO: %s COMPLETA %m'];

let S={p1:null,p2:null,news:[]};
function d2s(ts){return new Date(EPOCH.getTime()+ts*1000).toISOString().split('T')[0]}
function tab(t){document.querySelectorAll('.tab').forEach((e,i)=>{e.classList.toggle('active',['dash','tl','news','imp'][i]===t)});
document.querySelectorAll('.panel').forEach((e,i)=>{e.classList.toggle('active',['dash','tl','news','imp'][i]===t)})}

async function load(){try{const r=await fetch(DB+'/race.json?t='+Date.now());const d=await r.json();if(d){S=d;localStorage.setItem('sr',JSON.stringify(S));return}}catch(e){console.warn('Firebase offline',e)}
const s=localStorage.getItem('sr');if(s)S=JSON.parse(s)}
async function save(){localStorage.setItem('sr',JSON.stringify(S));
try{await fetch(DB+'/race.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(S)})}catch(e){}}

function parse(text){
const R={milestones:{},records:[],rep:0,funds:0,gameDate:0,done:0,fail:0};
const lines=text.split('\n');
const rm=text.match(/^\s*rep = ([\d.]+)/m);if(rm)R.rep=parseFloat(rm[1]);
const fm=text.match(/^\s*funds = ([\d.]+)/m);if(fm)R.funds=parseFloat(fm[1]);
let i=0;
while(i<lines.length){const t=lines[i].trim();
if(t==='CONTRACT'||t==='CONTRACT_FINISHED'){
let sub=null,st=null,ct=0,ti=null,bc=0;i++;
while(i<lines.length){const l=lines[i].trim();
if(l==='{')bc++;else if(l==='}'){bc--;if(bc===0)break}
else if(bc===1){const m=l.match(/^(\S+)\s*=\s*(.+)$/);if(m){
if(m[1]==='subtype')sub=m[2].trim();if(m[1]==='state')st=m[2].trim();if(m[1]==='title')ti=m[2].trim();
if(m[1]==='values'){const p=m[2].split(',').map(Number);for(let j=p.length-1;j>=0;j--)if(p[j]>1e8){ct=p[j];break}}
}}i++}
if(st==='Completed'&&sub){R.done++;const ms=MM[sub];if(ms&&ct>0&&(!R.milestones[ms]||ct<R.milestones[ms]))R.milestones[ms]=ct;
if(ct>R.gameDate)R.gameDate=ct}
if(st==='Failed')R.fail++}i++}
const um=text.match(/\bUT\s*=\s*([\d.]+)/);if(um){const u=parseFloat(um[1]);if(u>R.gameDate)R.gameDate=u}
return R}

async function imp(n){
const name=document.getElementById('n'+n+'i').value.trim()||('Player '+n);
const fi=document.getElementById('f'+n),si=document.getElementById('s'+n);
if(!fi.files.length){si.textContent='Ningun archivo seleccionado';return}
const reader=new FileReader();
reader.onload=async function(e){
const data=parse(e.target.result);
S['p'+n]={name,rep:data.rep,funds:data.funds,gameDate:data.gameDate,milestones:data.milestones,
contractsCompleted:data.done,contractsFailed:data.fail,importTime:new Date().toISOString()};
// Sync both to earlier date
if(S.p1&&S.p2){const cut=Math.min(S.p1.gameDate,S.p2.gameDate);
S.p1.milestones=Object.fromEntries(Object.entries(S.p1.milestones).filter(([,v])=>v<=cut));
S.p2.milestones=Object.fromEntries(Object.entries(S.p2.milestones).filter(([,v])=>v<=cut));
S.p1.gameDate=cut;S.p2.gameDate=cut}
// News
for(const[ms,ts]of Object.entries(S['p'+n].milestones)){
if(S.news.some(x=>x.milestone===ms&&x.player===n))continue;
const other=S[n===1?'p2':'p1'];
const first=!other||!other.milestones[ms]||ts<=other.milestones[ms];
S.news.unshift({date:d2s(ts),headline:HL[Math.floor(Math.random()*HL.length)].replace('%s',name.toUpperCase()).replace('%m',ms.toUpperCase()),player:n,milestone:ms,first})}
S.news.sort((a,b)=>b.date>a.date?1:-1);
await save();render();
si.textContent='OK! '+Object.keys(S['p'+n].milestones).length+' hitos, '+data.rep.toFixed(0)+' rep'};
reader.readAsText(fi.files[0])}

async function sync(){const r=await fetch(DB+'/race.json');const d=await r.json();if(d){S=d;render();
document.getElementById('ss').textContent='Actualizado!'}else document.getElementById('ss').textContent='Sin datos en la nube'}

function render(){
if(S.p1){document.getElementById('n1').textContent=S.p1.name;document.getElementById('r1').textContent=Math.floor(S.p1.rep)+' REP';
document.getElementById('i1').textContent=d2s(S.p1.gameDate)+' | $'+Math.floor(S.p1.funds).toLocaleString();document.getElementById('n1i').value=S.p1.name}
if(S.p2){document.getElementById('n2').textContent=S.p2.name;document.getElementById('r2').textContent=Math.floor(S.p2.rep)+' REP';
document.getElementById('i2').textContent=d2s(S.p2.gameDate)+' | $'+Math.floor(S.p2.funds).toLocaleString();document.getElementById('n2i').value=S.p2.name}
renderStats();renderTL();renderNews()}

function renderStats(){
const el=document.getElementById('statsEl');if(!S.p1&&!S.p2){el.innerHTML='<div class="card"><p style="color:#484f58">Importa las partidas para empezar</p></div>';return}
const n1=S.p1?S.p1.name:'--',n2=S.p2?S.p2.name:'--';
const m1=S.p1?Object.keys(S.p1.milestones).length:0,m2=S.p2?Object.keys(S.p2.milestones).length:0;
let w1=0,w2=0;if(S.p1&&S.p2)for(const m of MO){const t1=S.p1.milestones[m],t2=S.p2.milestones[m];
if(t1&&t2){if(t1<t2)w1++;else if(t2<t1)w2++}else if(t1)w1++;else if(t2)w2++}
const tot=w1+w2||1;
const v=(p,fn)=>p?fn(p):'--';
let h=`<div class="card"><h3>Resumen</h3><table class="data">
<tr><th></th><th class="p1">${n1}</th><th class="p2">${n2}</th></tr>
<tr><td>Reputacion</td><td class="p1">${v(S.p1,p=>Math.floor(p.rep))}</td><td class="p2">${v(S.p2,p=>Math.floor(p.rep))}</td></tr>
<tr><td>Fondos</td><td class="p1">${v(S.p1,p=>'$'+Math.floor(p.funds).toLocaleString())}</td><td class="p2">${v(S.p2,p=>'$'+Math.floor(p.funds).toLocaleString())}</td></tr>
<tr><td>Hitos</td><td class="p1">${m1}/${MO.length}</td><td class="p2">${m2}/${MO.length}</td></tr>
<tr><td>Primeros</td><td class="p1">${w1}</td><td class="p2">${w2}</td></tr>
<tr><td>Contratos</td><td class="p1">${v(S.p1,p=>p.contractsCompleted)}</td><td class="p2">${v(S.p2,p=>p.contractsCompleted)}</td></tr>
<tr><td>Tasa de Exito</td><td class="p1">${v(S.p1,p=>p.contractsCompleted?(p.contractsCompleted/(p.contractsCompleted+p.contractsFailed)*100).toFixed(0)+'%':'--')}</td><td class="p2">${v(S.p2,p=>p.contractsCompleted?(p.contractsCompleted/(p.contractsCompleted+p.contractsFailed)*100).toFixed(0)+'%':'--')}</td></tr>
<tr><td>Fecha en Juego</td><td class="p1">${v(S.p1,p=>d2s(p.gameDate))}</td><td class="p2">${v(S.p2,p=>d2s(p.gameDate))}</td></tr>
</table>
<div style="margin-top:12px"><div class="bar">${w1+w2>0?`<div style="width:${w1/tot*100}%;background:#58a6ff">${w1>0?w1:''}</div><div style="width:${w2/tot*100}%;background:#f85149">${w2>0?w2:''}</div>`:''}</div></div>
</div>`;
h+=`<div class="card"><h3>Por Categoria</h3><table class="data">
<tr><th></th><th class="p1">${n1}</th><th class="p2">${n2}</th></tr>`;
for(const[tier,[s,e]]of Object.entries(TIERS)){const sl=MO.slice(s,e+1);
const c1=sl.filter(m=>S.p1&&S.p1.milestones[m]).length,c2=sl.filter(m=>S.p2&&S.p2.milestones[m]).length;
h+=`<tr><td>${tier}</td><td class="p1">${c1}/${sl.length}</td><td class="p2">${c2}/${sl.length}</td></tr>`}
h+=`</table></div>`;el.innerHTML=h}

function renderTL(){
const el=document.getElementById('tlEl');if(!S.p1&&!S.p2){el.innerHTML='';return}
let h='<div style="display:flex;justify-content:space-between;padding:0 0 8px;font-size:0.8em;font-weight:700"><span class="p1">'+(S.p1?S.p1.name:'P1')+'</span><span class="p2">'+(S.p2?S.p2.name:'P2')+'</span></div>';
let ct='';for(let idx=0;idx<MO.length;idx++){const m=MO[idx];
for(const[tier,[s]]of Object.entries(TIERS))if(s===idx&&tier!==ct){ct=tier;h+=`<div class="tl-tier">${tier}</div>`}
const t1=S.p1?S.p1.milestones[m]:null,t2=S.p2?S.p2.milestones[m]:null;
let dc='none',f1=false,f2=false;
if(t1&&t2){if(t1<t2){dc='w1';f1=true}else if(t2<t1){dc='w2';f2=true}else dc='tie'}
else if(t1){dc='w1';f1=true}else if(t2){dc='w2';f2=true}
const hi=HIST[m]?`<span class="tl-hist">(${HIST[m]})</span>`:'';
h+=`<div class="tl-item"><div class="tl-p1">${t1?`<span class="tl-date${f1?' tl-first':''}">${d2s(t1)}${f1?' ★':''}</span>`:''}</div><div class="tl-dot ${dc}"></div><div class="tl-p2"><span class="tl-name">${m}</span> ${t2?`<span class="tl-date${f2?' tl-first':''}">${d2s(t2)}${f2?' ★':''}</span>`:''}${hi}</div></div>`}
el.innerHTML=h}

function renderNews(){
const el=document.getElementById('newsEl');if(!S.news||!S.news.length){el.innerHTML='<p style="color:#484f58">Sin noticias aun</p>';return}
let h='';for(const n of S.news.slice(0,30)){const c=n.player===1?'p1':'p2';
h+=`<div class="news-item"><span class="date">${n.date}</span>${n.first?' <span class="tag">PRIMERO</span>':''}<div class="${c}">${n.headline}</div></div>`}
el.innerHTML=h}

load().then(()=>{render();console.log('Loaded from cloud, firsts:',S.p1?Object.keys(S.p1.milestones).length:'none',S.p2?Object.keys(S.p2.milestones).length:'none')}).catch(e=>console.error('Load failed',e));
</script>
</body>
</html>
